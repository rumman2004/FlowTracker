<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>

    <!-- Main gradient: orange to red -->
    <linearGradient id="mainGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#f97316" />
      <stop offset="100%" stop-color="#dc2626" />
    </linearGradient>

    <!-- Glow filter -->
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur" />
      <feMerge>
        <feMergeNode in="coloredBlur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Soft inner shadow for depth -->
    <filter id="innerShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2" result="blur" />
      <feOffset dx="0" dy="2" result="offsetBlur" />
      <feComposite in="SourceGraphic" in2="offsetBlur" operator="over" />
    </filter>

    <!-- Rounded rect clip -->
    <clipPath id="roundedClip">
      <rect width="100" height="100" rx="22" ry="22" />
    </clipPath>

  </defs>

  <!-- ── Background rounded square ── -->
  <rect
    width="100" height="100"
    rx="22" ry="22"
    fill="#0f0f1a"
  />

  <!-- ── Subtle radial glow behind icon ── -->
  <radialGradient id="bgGlow" cx="50%" cy="50%" r="50%">
    <stop offset="0%"   stop-color="#f97316" stop-opacity="0.18" />
    <stop offset="100%" stop-color="#f97316" stop-opacity="0"    />
  </radialGradient>
  <rect
    width="100" height="100" rx="22" ry="22"
    fill="url(#bgGlow)"
  />

  <!-- ── Thin border ── -->
  <rect
    width="100" height="100" rx="22" ry="22"
    fill="none"
    stroke="rgba(249,115,22,0.25)"
    stroke-width="1.5"
  />

  <!-- ── Lightning bolt (flow / energy / streak) ── -->
  <!-- Bold, centered, slightly tilted feel -->
  <path
    d="M 57 14
       L 33 54
       L 47 54
       L 43 86
       L 67 46
       L 53 46
       Z"
    fill="url(#mainGrad)"
    filter="url(#glow)"
  />

  <!-- ── Highlight shine on bolt ── -->
  <path
    d="M 57 14
       L 33 54
       L 40 54
       L 57 24
       Z"
    fill="rgba(255,255,255,0.18)"
  />

  <!-- ── Three small streak dots (bottom right) — represent habit streak ── -->
  <circle cx="70" cy="72" r="3.5" fill="#f97316" opacity="0.9" filter="url(#glow)" />
  <circle cx="70" cy="82" r="2.5" fill="#f97316" opacity="0.55" />
  <circle cx="70" cy="90" r="1.8" fill="#f97316" opacity="0.3"  />

</svg>